name: Generar Libro de Recetas (PDF)

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permiso para que el bot pueda subir cambios (el pdf a root dentro del mismo repo)

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm install

      - name: 🚀 Generar PDF
        run: npm run generate-pdf

      - name: 📝 Auto-commit del PDF
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Coffee-Specs-Libro.pdf
          if git diff --staged --quiet; then
            echo "No hay cambios en el PDF para subir."
          else
            git commit -m "docs: actualizar libro de recetas PDF automático [skip ci]"
            git push origin master
          fi

      - name: 📤 Subir PDF como artefacto (opcional)
        uses: actions/upload-artifact@v4
        with:
          name: Coffee-Specs-Libro
          path: Coffee-Specs-Libro.pdf
          retention-days: 7
